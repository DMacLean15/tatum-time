# ───────────────────────────────────────────────────────────────
#  Tatum Time — CMS configuration (the fields Dan fills in)
# ───────────────────────────────────────────────────────────────

backend:
  name: github                       # logs in with a GitHub account (works on any host)
  repo: DMacLean15/tatum-time        # the GitHub repo the site deploys from
  branch: main                       # the branch your site deploys from
  base_url: https://tatumtime.net    # where the login helper lives (Cloudflare Pages Functions)
  auth_endpoint: /auth

# Lets you trial the CMS on your own computer first (see DEPLOY-CMS guide).
local_backend: true

# Where uploaded images are stored in the repo.
media_folder: "images/uploads"
public_folder: "/images/uploads"

# The live site address (used for the CMS preview links).
site_url: https://tatumtime.net
display_url: https://tatumtime.net
logo_url: /logo.svg     # Tatum Time logo shown on the login screen

collections:
  - name: "blog"
    label: "📝 Blog Posts"
    label_singular: "Post"
    description: "Write, edit, and delete Tatum Time posts. Each post is its own entry — use the search box to find one fast. Posts sort by date automatically. Stuck on formatting? Click the green 'Formatting Help' button in the bottom-right corner anytime."
    folder: "content/posts"       # each post is one .md file in here
    create: true                  # allow creating new posts
    slug: "{{slug}}"              # filename comes from the headline
    summary: "{{fields.date}}  —  {{fields.title}}"
    sortable_fields: ["date", "title"]
    editor:
      preview: true               # live preview pane, styled to match the blog (see admin/index.html)
    fields:
      - name: "title"
        label: "Headline"
        widget: "string"

      - name: "emoji"
        label: "Banner Emoji"
        widget: "string"
        default: "🏀"
        hint: "One emoji shown on the post's banner — e.g. 🏀 🍀 🔥 🏆 🎯 🐣 🃏"

      - name: "image"
        label: "Featured Photo (optional)"
        widget: "image"
        required: false
        choose_url: false
        hint: "Big photo shown at the top of the post and on the post cards. Leave blank and the first photo in your article is used automatically."

      - name: "imageFocus"
        label: "Hero Photo Focus"
        widget: "select"
        default: "Center"
        options: ["Center", "Top", "Bottom", "Left", "Right"]
        required: false
        hint: "The top photo crops to a wide banner. If it cuts off the important part, pick which part to keep in view — e.g. 'Top' to keep a face. Most photos look best on Center."

      - name: "category"
        label: "Category"
        widget: "select"
        default: "Recap"
        options: ["Recap", "Analysis", "News", "Playoffs", "Draft", "Roster", "Milestone"]

      - name: "featured"
        label: "⭐ Feature this post"
        widget: "boolean"
        default: false
        required: false
        hint: "Turn ON to pin this to the big 'Featured Post' spot on the homepage. Leave OFF and the newest post is featured automatically. Only turn it on for one post."

      - name: "date"
        label: "Date"
        widget: "datetime"
        format: "YYYY-MM-DD"
        date_format: "MMM D, YYYY"
        time_format: false
        picker_utc: false
        hint: "Pick the post's date from the calendar. New posts default to today. (Stored in a sortable format; shows as 'Jul 1, 2026' on the site.)"

      - name: "gameLink"
        label: "Game Box-Score Link"
        widget: "string"
        required: false
        pattern: ['^$|^https?://.+', 'Paste a full web address starting with http:// (or leave it blank)']
        hint: "Paste an NBA.com box-score web address to show a green 'See full game stats' button. Leave blank for no button."

      - name: "body"
        label: "Article"
        widget: "markdown"
        hint: "Toolbar = bold, headings, lists, photos. Wrap a stat in == for a green tag (==28.3 PPG==). Paste a YouTube link on its own line to embed the video. The preview on the right shows how it'll look (green tags show as ==text== in the preview but turn green on the live site)."
